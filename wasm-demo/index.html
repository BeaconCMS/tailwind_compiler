<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--dim:#94a3b8;--accent:#8b5cf6;--mono:'SF Mono','Fira Code','Cascadia Code','Consolas',monospace}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
header h1{font-size:14px;font-weight:600}
header h1 span{color:var(--accent)}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.examples{display:flex;gap:4px}
.examples button{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--dim);font-size:12px;cursor:pointer;transition:all .15s}
.examples button:hover{border-color:var(--accent);color:var(--text)}
.examples button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.controls{display:flex;align-items:center;gap:12px;margin-left:auto}
.controls label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim);cursor:pointer;user-select:none}
.controls input[type=checkbox]{accent-color:var(--accent)}
.panels{display:flex;flex:1;min-height:0}
.panel{display:flex;flex-direction:column;flex:1;min-width:0;border-right:1px solid var(--border)}
.panel:last-child{border-right:none}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.panel-stats{font-size:11px;font-weight:400;text-transform:none;letter-spacing:normal;font-variant-numeric:tabular-nums;display:flex;gap:10px}
.panel-stats .time{color:#34d399;font-weight:600}
.panel-stats .size{color:var(--dim)}
#preview{flex:1;border:none;background:#fff}
#error{display:none;padding:12px 16px;background:#451a1a;color:#fca5a5;font-size:13px;border-bottom:1px solid #7f1d1d;flex-shrink:0}

/* Editor overlay */
.editor-wrap{position:relative;flex:1;min-height:0;overflow:hidden}
.editor-wrap textarea,.editor-wrap pre{position:absolute;top:0;left:0;right:0;bottom:0;font-family:var(--mono);font-size:13px;line-height:1.6;padding:12px;margin:0;border:none;white-space:pre;overflow:auto;tab-size:2;word-wrap:normal}
.editor-wrap textarea{color:transparent;caret-color:#e2e8f0;-webkit-text-fill-color:transparent;background:transparent;z-index:2;resize:none;outline:none}
.editor-wrap pre{z-index:1;pointer-events:none;background:transparent;color:var(--text)}

/* CSS output (read-only, no overlay needed) */
.css-wrap{flex:1;min-height:0;overflow:auto;padding:12px;font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre;word-wrap:normal;color:var(--text)}

/* Syntax highlighting colors */
.hl-punct{color:#6272a4}
.hl-tag{color:#ff79c6}
.hl-attr{color:#50fa7b}
.hl-str{color:#f1fa8c}
.hl-at{color:#ff79c6}
.hl-sel{color:#8be9fd}
.hl-prop{color:#50fa7b}
.hl-val{color:#f8f8f2}
.hl-brace{color:#6272a4}
.hl-num{color:#bd93f9}
</style>
</head>

// ── Syntax Highlighting ────────────────────────────────────

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function highlightHTML(src) {
  // Escape first, then match on escaped entities
  let html = esc(src);
  // Match tags: &lt; ... &gt;
  html = html.replace(/&lt;(\/?)([\w-]+)([\s\S]*?)(\/?)\s*&gt;/g, (_, slash, tag, attrs, selfClose) => {
    let r = `<span class="hl-punct">&lt;${slash}</span><span class="hl-tag">${tag}</span>`;
    // Highlight attributes within the rest
    r += attrs.replace(/([\w@:.-]+)(\s*=\s*)"([^"]*)"/g,
      '<span class="hl-attr">$1</span><span class="hl-punct">$2</span><span class="hl-str">"$3"</span>');
    r += `<span class="hl-punct">${selfClose}&gt;</span>`;
    return r;
  });
  return html;
}

function highlightCSSPretty(src) {
  return src.split('\n').map(line => {
    const trimmed = line.trim();
    if (!trimmed) return '';
    const indent = esc(line.slice(0, line.length - line.trimStart().length));

    // Closing brace
    if (trimmed === '}') return indent + '<span class="hl-brace">}</span>';

    // At-rule opening: @keyword ... {
    if (trimmed.startsWith('@') && trimmed.endsWith('{')) {
      const m = trimmed.match(/^(@[\w-]+)(\s.*?)?\s*(\{)$/);
      if (m) return indent
        + `<span class="hl-at">${esc(m[1])}</span>`
        + (m[2] ? esc(m[2]) : '')
        + ` <span class="hl-brace">{</span>`;
    }

    // Selector opening: ... {
    if (trimmed.endsWith('{')) {
      const sel = trimmed.slice(0, -1).trim();
      return indent + `<span class="hl-sel">${esc(sel)}</span> <span class="hl-brace">{</span>`;
    }

    // Declaration: property: value;
    const colon = trimmed.indexOf(':');
    if (colon > 0) {
      const prop = trimmed.slice(0, colon);
      const rest = trimmed.slice(colon + 1);
      const hasSemi = rest.endsWith(';');
      const val = (hasSemi ? rest.slice(0, -1) : rest).trim();
      return indent
        + `<span class="hl-prop">${esc(prop)}</span>`
        + `<span class="hl-brace">:</span> `
        + `<span class="hl-val">${highlightCSSValue(val)}</span>`
        + (hasSemi ? '<span class="hl-brace">;</span>' : '');
    }

    return indent + esc(trimmed);
  }).join('\n');
}

function highlightCSSMinified(src) {
  let html = esc(src);
  html = html.replace(/@[\w-]+/g, '<span class="hl-at">$&</span>');
  html = html.replace(/[{}]/g, '<span class="hl-brace">$&</span>');
  html = html.replace(/;/g, '<span class="hl-brace">;</span>');
  return html;
}

function highlightCSSValue(val) {
  let v = esc(val);
  v = v.replace(/"[^"]*"/g, '<span class="hl-str">$&</span>');
  v = v.replace(/\b(\d+\.?\d*)(px|rem|em|%|vh|vw|deg|s|ms|lh)?\b/g, '<span class="hl-num">$&</span>');
  return v;
}

// ── WASM interface ──────────────────────────────────────────

let wasm = null;
const encoder = new TextEncoder();
const decoder = new TextDecoder();

function writeStr(s) {
  const bytes = encoder.encode(s);
  const ptr = wasm.alloc(bytes.length);
  if (!ptr) throw new Error('WASM alloc failed');
  new Uint8Array(wasm.memory.buffer, ptr, bytes.length).set(bytes);
  return [ptr, bytes.length];
}

function readStr(ptr, len) {
  return decoder.decode(new Uint8Array(wasm.memory.buffer, ptr, len));
}

function extractCandidates(html) {
  const classes = new Set();
  const re = /class\s*=\s*["']([^"']*)["']/gi;
  let m;
  while ((m = re.exec(html)) !== null) {
    for (const cls of m[1].split(/\s+/)) {
      if (cls) classes.add(cls);
    }
  }
  return [...classes];
}

function compileTailwind(html, preflight, minify, pluginCss) {
  const candidates = extractCandidates(html);
  if (!candidates.length) return '';

  const cand = writeStr(candidates.join('\n'));
  const plugin = pluginCss ? writeStr(pluginCss) : [0, 0];

  const result = wasm.compile(
    cand[0], cand[1],
    0, 0,
    preflight ? 1 : 0,
    minify ? 1 : 0,
    0, 0,
    0, 0,
    plugin[0], plugin[1]
  );

  wasm.free(cand[0], cand[1]);
  if (plugin[0]) wasm.free(plugin[0], plugin[1]);

  if (result === 0n) return '';

  const ptr = Number(result >> 32n);
  const len = Number(result & 0xFFFFFFFFn);
  const css = readStr(ptr, len);
  wasm.free(ptr, len);
  return css;
}

// ── TailwindCSS helper (adoptedStyleSheets) ─────────────────
//
// Use this to apply compiled CSS at runtime without compounding rules.
// Each call to update() atomically replaces the previous stylesheet.
//
// Usage:
//   const tw = new TailwindCSS(wasm);
//   tw.update(['flex', 'p-4', 'hover:bg-blue-500'], {
//     preflight: true,
//     minify: true,
//     pluginCss: ':root { --color-primary: oklch(62% 0.21 260); }',
//   });
//
// Or apply to a specific document (e.g., an iframe):
//   const tw = new TailwindCSS(wasm, iframe.contentDocument);
//
class TailwindCSS {
  constructor(wasmExports, doc = document) {
    this._wasm = wasmExports;
    this._doc = doc;
    this._sheet = new CSSStyleSheet();
    this._doc.adoptedStyleSheets = [...this._doc.adoptedStyleSheets, this._sheet];
  }

  update(candidates, opts = {}) {
    if (!candidates.length) { this._sheet.replaceSync(''); return ''; }
    const preflight = opts.preflight ?? true;
    const minify = opts.minify ?? true;
    const pluginCss = opts.pluginCss ?? null;

    const cand = this._writeStr(candidates.join('\n'));
    const plugin = pluginCss ? this._writeStr(pluginCss) : [0, 0];

    const result = this._wasm.compile(
      cand[0], cand[1], 0, 0,
      preflight ? 1 : 0, minify ? 1 : 0,
      0, 0, 0, 0,
      plugin[0], plugin[1]
    );

    this._wasm.free(cand[0], cand[1]);
    if (plugin[0]) this._wasm.free(plugin[0], plugin[1]);

    if (result === 0n) { this._sheet.replaceSync(''); return ''; }

    const ptr = Number(result >> 32n);
    const len = Number(result & 0xFFFFFFFFn);
    const css = new TextDecoder().decode(
      new Uint8Array(this._wasm.memory.buffer, ptr, len)
    );
    this._wasm.free(ptr, len);

    this._sheet.replaceSync(css);
    return css;
  }

  destroy() {
    this._doc.adoptedStyleSheets = this._doc.adoptedStyleSheets.filter(s => s !== this._sheet);
  }

  _writeStr(s) {
    const bytes = new TextEncoder().encode(s);
    const ptr = this._wasm.alloc(bytes.length);
    if (!ptr) throw new Error('WASM alloc failed');
    new Uint8Array(this._wasm.memory.buffer, ptr, bytes.length).set(bytes);
    return [ptr, bytes.length];
  }
}

// ── UI ──────────────────────────────────────────────────────

const htmlInput   = document.getElementById('html-input');
const htmlHl      = document.getElementById('html-hl');
const cssOutput   = document.getElementById('css-output');
const cssWrap     = cssOutput.parentElement;
const preview     = document.getElementById('preview');
const statusEl    = document.getElementById('status');
const cssStatsEl  = document.getElementById('css-stats');
const errorEl     = document.getElementById('error');
const preflightCb = document.getElementById('preflight');
const minifyCb    = document.getElementById('minify');
let currentExample = 'card';
let previewTw = null; // TailwindCSS instance for the preview iframe

function showError(msg) {
  errorEl.style.display = 'block';
  errorEl.textContent = msg;
}

function updateHTMLHighlight() {
  htmlHl.innerHTML = highlightHTML(htmlInput.value) + '\n';
}

function doCompile() {
  if (!wasm) return;
  const html = htmlInput.value;
  const minify = minifyCb.checked;

  const pluginCss = EXAMPLES[currentExample]?.plugin_css || null;

  const t0 = performance.now();
  let css;
  try {
    css = compileTailwind(html, preflightCb.checked, minify, pluginCss);
  } catch (e) {
    showError('Compilation error: ' + e.message);
    return;
  }
  const ms = (performance.now() - t0).toFixed(1);
  const kb = (encoder.encode(css).length / 1024).toFixed(1);

  errorEl.style.display = 'none';
  cssOutput.innerHTML = minify ? highlightCSSMinified(css) : highlightCSSPretty(css);
  cssStatsEl.innerHTML = `<span class="time">${ms} ms</span> <span class="size">${kb} KB</span>`;

  // Update the preview iframe using adoptedStyleSheets.
  // Reuse the CSS we already compiled (may be pretty-printed — that's valid CSS).
  // replaceSync atomically swaps all rules — no compounding.
  const previewDoc = preview.contentDocument;
  if (previewDoc) {
    if (!previewTw) {
      previewDoc.open();
      previewDoc.write('<!DOCTYPE html><html><head></head><body style="margin:0;font-family:system-ui,-apple-system,sans-serif"></body></html>');
      previewDoc.close();
      // Construct the sheet inside the iframe's context so it can be adopted there
      const SheetCtor = preview.contentWindow.CSSStyleSheet;
      previewTw = new SheetCtor();
      previewDoc.adoptedStyleSheets = [previewTw];
    }
    previewDoc.body.innerHTML = html;
    previewTw.replaceSync(css);
  }
}

let timer;
function scheduleCompile() {
  clearTimeout(timer);
  timer = setTimeout(doCompile, 150);
}

// Sync highlight layer with textarea input
htmlInput.addEventListener('input', () => {
  updateHTMLHighlight();
  scheduleCompile();
});

// Sync scroll positions
htmlInput.addEventListener('scroll', () => {
  const pre = htmlInput.previousElementSibling;
  pre.scrollTop = htmlInput.scrollTop;
  pre.scrollLeft = htmlInput.scrollLeft;
});

preflightCb.addEventListener('change', doCompile);
minifyCb.addEventListener('change', doCompile);

// Tab key inserts spaces
htmlInput.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = htmlInput.selectionStart;
    const end = htmlInput.selectionEnd;
    htmlInput.value = htmlInput.value.substring(0, start) + '  ' + htmlInput.value.substring(end);
    htmlInput.selectionStart = htmlInput.selectionEnd = start + 2;
    updateHTMLHighlight();
    scheduleCompile();
  }
});

// Example buttons
for (const btn of document.querySelectorAll('[data-example]')) {
  btn.addEventListener('click', () => {
    document.querySelector('.examples .active')?.classList.remove('active');
    btn.classList.add('active');
    currentExample = btn.dataset.example;
    htmlInput.value = EXAMPLES[currentExample].html;
    updateHTMLHighlight();
    doCompile();
  });
}

// ── Load WASM ───────────────────────────────────────────────

async function init() {
  const paths = [
    'tailwind_compiler.wasm',
    '../zig-out/bin/tailwind_compiler.wasm',
  ];

  let instance;
  for (const path of paths) {
    try {
      const resp = await fetch(path);
      if (!resp.ok) continue;
      const result = await WebAssembly.instantiateStreaming(resp, {});
      instance = result.instance;
      break;
    } catch {
      try {
        const resp = await fetch(path);
        if (!resp.ok) continue;
        const buf = await resp.arrayBuffer();
        const result = await WebAssembly.instantiate(buf, {});
        instance = result.instance;
        break;
      } catch { /* try next path */ }
    }
  }

  if (!instance) {
    showError('Could not load tailwind_compiler.wasm. Serve this directory with a web server and ensure the WASM file is accessible.');
    statusEl.textContent = 'WASM load failed';
    return;
  }

  wasm = instance.exports;
  statusEl.textContent = 'Ready';

  htmlInput.value = EXAMPLES.card.html;
  updateHTMLHighlight();
  doCompile();
}

init();
</script>
